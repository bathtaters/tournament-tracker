# NGINX config for serving client & API from the same port
limit_req_zone $binary_remote_addr zone=retreat:10m rate=10r/s;

server {
    listen 80;
    index index.html;

    gzip             on;
    gzip_comp_level  3;
    gzip_types       text/plain text/css image/*;

    location / {
        limit_req zone=retreat burst=12 delay=6;

        root /usr/share/server/html;
        index /index.html;
        try_files $uri /index.html =404;
    }

    location /api/ {
        limit_req zone=retreat burst=25 delay=10;

        proxy_pass          http://host.docker.internal:9090;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade             $http_upgrade;
        proxy_set_header    Connection          'upgrade';
        proxy_set_header    X-Forwarded-Host    $host;
        proxy_set_header    X-Forwarded-Proto   $scheme;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_cache_bypass  $http_upgrade;
    }

    error_page 503 /503.txt;
    location = /503.txt {
        root /usr/share/nginx/txt;
        internal;
    }
}
