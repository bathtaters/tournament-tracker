# !! This workflow requires nvm & rsync installed on the remote host !! #

name: Test, Build & Deploy

on:
  push:
    branches:
      - production
  pull_request:
    branches:
      - production
  workflow_dispatch:
    inputs:
      # Defaults to DEV (For testing workflow)
      proc_name:
        description: "Name of API process for PM2"
        required: false
        type: string
        default: "tournament-tracker-test"
      proc_port:
        description: "API port for PM2"
        required: false
        type: number
        default: 3072
      remote_dir:
        description: "Folder on remote host to deploy client to (relative to home)"
        required: false
        type: string
        default: "tt_test"
      db_name:
        description: "Name of database used by API"
        required: false
        type: string
        default: "tt_test"

env:
  # Default to PROD (For push/pull workflow)
  PROC_NAME: ${{ inputs.proc_name || vars.PROC_NAME || 'tournament-tracker-backend' }}
  PROC_PORT: ${{ inputs.proc_port || vars.PROC_PORT || 3070 }}
  REMOTE_DIR: ${{ inputs.remote_dir || vars.REMOTE_DIR || 'tournament-tracker' }}
  DB_NAME: ${{ inputs.db_name || vars.DB_NAME || 'tt_production' }}
  DB_USER: api
  DB_PROTOCOL: postgresql
  DB_PORT: 26257
  DB_SSL_MODE: verify-full
  DB_CERT_PATH: $HOME/.postgresql/root.crt
  API_CFG_PATH: ./api/src/config/dbServer.json
  SERVER_PATH: api/server.ts

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@main

      - name: Install Node.js
        uses: actions/setup-node@main
        with:
          node-version-file: ".nvmrc"

      - name: Read Node version from .nvmrc
        id: node_version
        run: echo "NODE_VERSION=$(sed 's/^v//' .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Install Podman
        run: |
          if ! command -v podman &> /dev/null; then
            sudo apt-get install -y podman
          fi

      - name: Install API packages
        run: cd api && npm ci

      - name: Create API config
        run: |
          echo '{' > temp.json
          echo '  "connectionString": "%PROTO://%NAME:%PASS@%DOM:%PORT/%DB?sslmode=%MODE&sslrootcert=%CERT&options=%OPTS",' >> temp.json
          echo '  "users": [{ "name": "${{ env.DB_USER }}", "pass": "${{ secrets.DB_API_KEY }}" }],' >> temp.json
          echo '  "server": {' >> temp.json
          echo '    "proto": "${{ env.DB_PROTOCOL }}",' >> temp.json
          echo '    "db": "${{ env.DB_NAME }}",' >> temp.json
          echo '    "opts": "${{ secrets.DB_OPTS }}",' >> temp.json
          echo '    "dom": "${{ secrets.DB_DOMAIN }}",' >> temp.json
          echo '    "port": "${{ env.DB_PORT }}",' >> temp.json
          echo '    "cert": "${{ env.DB_CERT_PATH }}",' >> temp.json
          echo '    "mode": "${{ env.DB_SSL_MODE }}"' >> temp.json
          echo '  },' >> temp.json
          echo '  "pwsalt": "${{ secrets.SALT }}",' >> temp.json
          echo '  "sessionSecret": "${{ secrets.SESSION }}",' >> temp.json
          echo '  "metricsToken": "${{ secrets.METRICS_TOKEN }}"' >> temp.json
          echo '}' >> temp.json
          mv temp.json "${{ env.API_CFG_PATH }}"

      #     SKIP UNTIL TESTS CAN BE CONVERTED TO TS
      #      - name: Test API
      #        run: cd api && npm test

      - name: Fix for podman cache
        # Fixes permissions error during cleanup
        run: |
          sudo mv -fv /usr/bin/tar /usr/bin/tar.orig
          echo -e '#!/bin/sh\n\nsudo /usr/bin/tar.orig "$@"' | sudo tee -a /usr/bin/tar
          sudo chmod +x /usr/bin/tar

      - name: Cache podman-machine
        uses: actions/cache@main
        with:
          path: |
            ~/.local/share/containers
            ~/.config/containers
          key: ${{ runner.os }}-podman-${{ hashFiles('api/package-lock.json', 'api/Containerfile') }}

      - name: Build image
        run: podman build --build-arg NODE_VERSION=${{ steps.node_version.outputs.NODE_VERSION }} -t ${{ env.PROC_NAME }}-api api

      - name: Compress image
        run: podman save -o ${{ env.PROC_NAME }}-api.tar ${{ env.PROC_NAME }}-api

      - name: Upload API image
        uses: actions/upload-artifact@main
        with:
          name: ${{ env.PROC_NAME }}-api-image
          path: ${{ env.PROC_NAME }}-api.tar

      - name: Sync API to client
        run: cd api && npm run sync

      - name: Install client packages
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Upload client
        uses: actions/upload-artifact@main
        with:
          name: client-build
          path: client/build

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download client build
        uses: actions/download-artifact@main
        with:
          name: client-build
          path: client

      - name: Download API image
        uses: actions/download-artifact@main
        with:
          name: ${{ env.PROC_NAME }}-api-image
          path: api

      - name: Install SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.REMOTE_HOST }} > ~/.ssh/known_hosts

      - name: Archive current builds
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} << 'EOF'
          [ -d "${{ env.REMOTE_DIR }}_old" ] && rm -rf "${{ env.REMOTE_DIR }}_old"
          [ -d "${{ env.REMOTE_DIR }}" ] && mv "${{ env.REMOTE_DIR }}" "${{ env.REMOTE_DIR }}_old"
          mkdir -p "${{ env.REMOTE_DIR }}"
          EOF

      - name: Copy client build to host
        run: rsync -avz client/ ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:${{ env.REMOTE_DIR }}/client/

      - name: Load API image on host
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} \
            'podman tag ${{ env.PROC_NAME }}-api ${{ env.PROC_NAME }}-api:previous 2>/dev/null || true; podman load' \
            < api/${{ env.PROC_NAME }}-api.tar

      - name: Deploy new container
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} << 'EOF'
          set -e
          podman stop -i ${{ env.PROC_NAME }}-api
          podman rm -i ${{ env.PROC_NAME }}-api
          podman run --memory 512m -d --name ${{ env.PROC_NAME }}-api \
            -p ${{ env.PROC_PORT }}:9090 \
            -v ~/.postgresql:/home/appuser/.postgresql:Z,ro \
            ${{ env.PROC_NAME }}-api
          EOF

      - name: Verify new container
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} << 'EOF'
          sleep 5
          if ! podman ps --filter name=${{ env.PROC_NAME }}-api --filter status=running -q | grep -q .; then
            echo "New container failed to stay up — rolling back"
            podman rm -f ${{ env.PROC_NAME }}-api
            podman run --memory 512m -d --name ${{ env.PROC_NAME }}-api \
              -p ${{ env.PROC_PORT }}:9090 \
              -v ~/.postgresql:/home/appuser/.postgresql:Z,ro \
              ${{ env.PROC_NAME }}-api:previous
            exit 1
          fi
          podman image prune -a -f
          EOF
